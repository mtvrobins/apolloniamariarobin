<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollonia Maria Robin — Creative Director / Photographer / Sound Designer</title>
<meta name="description" content="Apollonia Maria Robin — Creative Director, Photographer, Sound Designer.">

<style>
  :root{
    --black: #0a0a0a;
    --white: #f4f4f2;
    --grey:  #8a8a86;
    --line:  rgba(244,244,242,0.14);
    --ease: cubic-bezier(.16,.8,.24,1);
    --pl-pad-x: min(230px, 30vw);
    --pl-pad-y: min(54px, 9vw);
    --ctrl-size: 14px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
  }

  body{
    background:var(--black);
    color:var(--white);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  a{ color:inherit; text-decoration:none; }
  video{ display:block; max-width:100%; }

  .eyebrow{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--grey);
  }

  /* ---------------------------------------------------------
     PRELOADER — centered name in caps with corner brackets
     that draw in around it, then expand out to the screen
     edges and fade away once the page is ready.
  --------------------------------------------------------- */
  #preloader{
    position:fixed;
    inset:0;
    z-index:2000;
    background:var(--black);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:1;
    transition:opacity .9s var(--ease);
  }

  #preloader .pl-inner{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
  }

  #preloader .pl-name{
    font-size:clamp(16px, 2.6vw, 26px);
    letter-spacing:.22em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--white);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .8s var(--ease), transform .8s var(--ease);
    white-space:nowrap;
  }

  #preloader.show .pl-name{ opacity:1; transform:translateY(0); }

  #preloader .pl-sub{
    font-size:10px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--grey);
    white-space:nowrap;
    opacity:0;
    transform:translateY(4px);
    transition:opacity .8s var(--ease) .1s, transform .8s var(--ease) .1s;
  }

  #preloader.show .pl-sub{ opacity:1; transform:translateY(0); }

  #preloader.collapse .pl-sub{
    opacity:0;
    transition:opacity .5s var(--ease);
  }

  /* corner brackets — start collapsed near the text, expand
     outward to the screen corners on collapse */
  .pl-corner{
    position:fixed;
    width:15px;
    height:15px;
    opacity:0;
    transition:transform 1.1s var(--ease), opacity .7s var(--ease);
  }

  .pl-corner.tl{ top:26px; left:26px; border-top:1px solid var(--white); border-left:1px solid var(--white);
    transform:translate(calc(50vw - 26px - var(--pl-pad-x)), calc(50vh - 26px - var(--pl-pad-y))); }
  .pl-corner.tr{ top:26px; right:26px; border-top:1px solid var(--white); border-right:1px solid var(--white);
    transform:translate(calc(-50vw + 26px + var(--pl-pad-x)), calc(50vh - 26px - var(--pl-pad-y))); }
  .pl-corner.bl{ bottom:26px; left:26px; border-bottom:1px solid var(--white); border-left:1px solid var(--white);
    transform:translate(calc(50vw - 26px - var(--pl-pad-x)), calc(-50vh + 26px + var(--pl-pad-y))); }
  .pl-corner.br{ bottom:26px; right:26px; border-bottom:1px solid var(--white); border-right:1px solid var(--white);
    transform:translate(calc(-50vw + 26px + var(--pl-pad-x)), calc(-50vh + 26px + var(--pl-pad-y))); }

  #preloader.show .pl-corner{ opacity:1; }

  #preloader.collapse .pl-corner{
    transform:translate(0,0);
    opacity:0;
  }

  #preloader.collapse .pl-name{
    opacity:0;
    transition:opacity .5s var(--ease);
  }

  #preloader.collapse{
    transition:opacity .6s var(--ease) .7s;
    opacity:0;
  }

  #preloader.done{ display:none; }

  @media (prefers-reduced-motion: reduce){
    #preloader{ transition:none !important; }
    #preloader .pl-name, .pl-corner{ transition:none !important; }
  }

  /* ---------------------------------------------------------
     NAV
  --------------------------------------------------------- */
  header{
    position:fixed;
    top:0; left:0; right:0;
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:26px 40px;
    mix-blend-mode:difference;
  }

  .brand{
    font-size:14px;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-weight:600;
  }

  /* ---------------------------------------------------------
     VIDEO SECTIONS — each one is a full-screen snap point
  --------------------------------------------------------- */
  .video-section{
    position:relative;
    height:100svh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#000;
    gap:20px;
    scroll-snap-align:start;
    scroll-snap-stop:always;
  }

  .hero-stage{
    position:relative;
    width:min(1120px, 84vw);
    display:flex;
    flex-direction:column;
  }

  .hero-frame{
    position:relative;
    width:100%;
    height:min(640px, 62vh);
    background:#000;
    overflow:hidden;
  }

  .hero-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.72;
  }

  .hero-media.placeholder{
    background:
      radial-gradient(120% 90% at 15% 10%, #1c1c1a 0%, #0a0a0a 55%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 90px);
  }

  .hero-frame::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,.85) 100%);
    pointer-events:none;
  }

  /* ---------------------------------------------------------
     AUDIO INDICATOR — small crossfading reminder shown over
     the video while it is muted. Two phrases fade in and out
     of each other like a lighthouse beacon: a long, soft,
     steady pulse (~7.5s per full cycle, well under 30 BPM)
     so each phrase stays readable before it dims.
  --------------------------------------------------------- */
  .audio-indicator{
    position:absolute;
    top:14px;
    left:0;
    right:0;
    z-index:3;
    display:flex;
    justify-content:center;
    pointer-events:none;
    opacity:1;
    transition:opacity .5s var(--ease);
  }

  .audio-indicator.is-hidden{
    opacity:0;
  }

  .audio-indicator-inner{
    position:relative;
    height:14px;
  }

  .audio-indicator span{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    font-size:9.5px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--white);
    white-space:nowrap;
    opacity:0;
    animation:audioFade 8000ms ease-in-out infinite;
  }

  .audio-indicator span.phrase-b{
    animation-delay:-4000ms;
  }

  @keyframes audioFade{
    0%      { opacity:0; }
    6%      { opacity:.85; }
    44%     { opacity:.85; }
    50%     { opacity:0; }
    100%    { opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .audio-indicator span{ animation:none; opacity:.35; }
  }

  /* ---------------------------------------------------------
     CONTROL BAR — sits outside/below the video frame.
     Mixes the main sans (Inter) with a serif (Times New Roman)
     for the artist-name style text, like a media player.
     The thin corner brackets frame this bar only.
  --------------------------------------------------------- */
  .control-bar{
    position:relative;
    width:100%;
    background:#000;
    padding:20px 24px;
    display:flex;
    align-items:center;
    gap:22px;
  }

  .control-corner{
    position:absolute;
    width:8px;
    height:8px;
    pointer-events:none;
  }
  .control-corner.tl{ top:-3px; left:-3px; border-top:1px solid var(--white); border-left:1px solid var(--white); }
  .control-corner.tr{ top:-3px; right:-3px; border-top:1px solid var(--white); border-right:1px solid var(--white); }
  .control-corner.bl{ bottom:-3px; left:-3px; border-bottom:1px solid var(--white); border-left:1px solid var(--white); }
  .control-corner.br{ bottom:-3px; right:-3px; border-bottom:1px solid var(--white); border-right:1px solid var(--white); }

  .control-titles{
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-shrink:0;
    white-space:nowrap;
  }

  .control-track{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size:var(--ctrl-size);
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--white);
  }

  .control-artist{
    font-family:'Times New Roman', Georgia, 'Cambria', serif;
    font-size:var(--ctrl-size);
    color:var(--white);
    letter-spacing:.01em;
  }

  .control-mid{
    flex:1;
    display:flex;
    align-items:center;
    min-width:0;
  }

  .scrub-tooltip{
    position:absolute;
    bottom:calc(100% + 10px);
    left:0%;
    transform:translateX(-50%);
    font-family:'Times New Roman', Georgia, 'Cambria', serif;
    font-size:12px;
    color:var(--white);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }

  .scrub-tooltip.is-visible{ opacity:1; }

  .scrubber{
    position:relative;
    width:100%;
    height:14px;
    display:flex;
    align-items:center;
    cursor:pointer;
    touch-action:none;
  }

  .scrubber .track{
    position:relative;
    width:100%;
    height:1px;
    background:rgba(244,244,242,0.28);
  }

  .scrubber .fill{
    position:absolute;
    top:0; left:0; bottom:0;
    width:0%;
    background:var(--white);
  }

  .scrubber .knob{
    position:absolute;
    top:50%;
    left:0%;
    width:7px; height:7px;
    background:var(--white);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }

  .control-actions{
    display:flex;
    align-items:center;
    gap:18px;
    flex-shrink:0;
  }

  .ctrl-btn{
    background:none;
    border:none;
    padding:2px;
    cursor:pointer;
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:.9;
    transition:opacity .2s ease;
  }

  .ctrl-btn:hover{ opacity:1; }

  .ctrl-btn svg{
    width:var(--ctrl-size);
    height:var(--ctrl-size);
    display:block;
  }

  .ctrl-btn .icon-alt{ display:none; }
  .ctrl-btn.is-active .icon-default{ display:none; }
  .ctrl-btn.is-active .icon-alt{ display:block; }

  /* ---------------------------------------------------------
     SCROLL HINT — minimal cue on the first video only
  --------------------------------------------------------- */
  .scroll-hint{
    position:absolute;
    left:50%;
    bottom:26px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    opacity:.6;
    transition:opacity .5s var(--ease);
    z-index:3;
  }

  .scroll-hint.is-hidden{ opacity:0; }

  .scroll-hint span{
    font-size:10px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--grey);
  }

  .scroll-hint svg{
    width:12px;
    height:12px;
    animation:scrollBounce 2.4s ease-in-out infinite;
  }

  @keyframes scrollBounce{
    0%, 100% { transform:translateY(0); opacity:.5; }
    50%      { transform:translateY(5px); opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    .scroll-hint svg{ animation:none; }
  }

  @media (max-width:720px){
    .control-bar{ flex-wrap:wrap; padding:16px 16px; gap:12px; }
    .control-mid{ order:3; width:100%; }
    .control-actions{ gap:14px; }
  }

  /* ---------------------------------------------------------
     CONTACT
  --------------------------------------------------------- */
  .contact{
    border-top:1px solid var(--line);
    padding:110px 40px 90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:26px;
    scroll-snap-align:start;
  }

  .contact .eyebrow{ margin-bottom:4px; }

  .contact-email{
    font-size:clamp(24px, 4vw, 46px);
    font-weight:600;
    letter-spacing:-.01em;
    border-bottom:1px solid var(--line);
    padding-bottom:14px;
    transition:border-color .3s ease, opacity .3s ease;
  }
  .contact-email:hover{ border-color:var(--white); opacity:.8; }

  .contact-phone{
    font-size:15px;
    letter-spacing:.04em;
    color:var(--grey);
  }
  .contact-phone a:hover{ color:var(--white); }

  @media (max-width:560px){
    header{ padding:20px 22px; }
    .contact{ padding:80px 22px 60px; }
  }

  footer{
    border-top:1px solid var(--line);
    padding:26px 40px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--grey);
  }
  @media (max-width:560px){ footer{ padding:20px 22px; flex-direction:column; gap:6px; } }

  ::selection{ background:var(--white); color:var(--black); }
</style>
</head>

<script>
/* =====================================================================
   VIDEO SOURCES — set the file name for each video here.
   Keep the .mp4 file(s) in the same folder as this index.html.
===================================================================== */

const VIDEO_1 = { src: "reel.mp4", poster: "" };
const VIDEO_2 = { src: "reel2.mp4", poster: "" };

/* ===================================================================== */

document.getElementById('year').textContent = '© ' + new Date().getFullYear() + ' Apollonia Maria Robin';

function formatTime(seconds){
  if(!isFinite(seconds)) return '0:00';
  const total = Math.max(0, Math.floor(seconds));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

/* ---------------------------------------------------------
   Generic stage controller — wires up one video + its bar:
   play/pause, mute/unmute, hover-scrub tooltip, audio
   indicator, and play-only-when-in-view behaviour.
--------------------------------------------------------- */
function initVideoStage(cfg){
  const video = document.getElementById(cfg.videoId);
  const stage = document.getElementById(cfg.stageId);
  const frame = video.closest('.hero-frame');
  const playBtn = document.getElementById(cfg.playBtnId);
  const muteBtn = document.getElementById(cfg.muteBtnId);
  const scrubber = document.getElementById(cfg.scrubberId);
  const scrubberFill = document.getElementById(cfg.scrubberFillId);
  const scrubberKnob = document.getElementById(cfg.scrubberKnobId);
  const scrubTooltip = document.getElementById(cfg.scrubTooltipId);
  const audioIndicator = document.getElementById(cfg.audioIndicatorId);

  if(cfg.video.src){
    video.src = cfg.video.src;
    if(cfg.video.poster) video.poster = cfg.video.poster;
  } else {
    video.classList.add('placeholder');
  }

  function updatePlayIcon(){
    playBtn.classList.toggle('is-active', video.paused);
    playBtn.setAttribute('aria-label', video.paused ? 'Play' : 'Pause');
  }

  function updateMuteIcon(){
    muteBtn.classList.toggle('is-active', video.muted);
    muteBtn.setAttribute('aria-label', video.muted ? 'Unmute' : 'Mute');
    audioIndicator.classList.toggle('is-hidden', !video.muted);
  }

  function togglePlay(){
    if(video.paused){ video.play(); } else { video.pause(); }
    updatePlayIcon();
  }

  function unmute(){
    video.muted = false;
    updateMuteIcon();
  }

  function toggleMute(){
    video.muted = !video.muted;
    updateMuteIcon();
  }

  playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
  muteBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMute(); });

  /* First tap/click on the video frame unmutes it.
     Once unmuted, tapping the frame toggles play/pause. */
  frame.addEventListener('click', () => {
    if(video.muted){
      unmute();
    } else {
      togglePlay();
    }
  });

  function setScrubber(ratio){
    const pct = Math.min(1, Math.max(0, ratio)) * 100;
    scrubberFill.style.width = pct + '%';
    scrubberKnob.style.left = pct + '%';
  }

  /* Hover/scrub tooltip — shows the time at the cursor's position
     along the scrubber, right above the cursor. Only visible while
     hovering or actively dragging; hidden the rest of the time. */
  function updateTooltip(ratio){
    const clamped = Math.min(1, Math.max(0, ratio));
    const t = video.duration ? clamped * video.duration : 0;
    scrubTooltip.textContent = formatTime(t);
    scrubTooltip.style.left = (clamped * 100) + '%';
  }

  function ratioFromEvent(e){
    const rect = scrubber.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) / rect.width;
  }

  let isScrubbing = false;

  video.addEventListener('timeupdate', () => {
    if(!video.duration || isScrubbing) return;
    setScrubber(video.currentTime / video.duration);
  });

  video.addEventListener('play', updatePlayIcon);
  video.addEventListener('pause', updatePlayIcon);
  video.addEventListener('volumechange', updateMuteIcon);

  function seekFromEvent(e){
    const ratio = ratioFromEvent(e);
    setScrubber(ratio);
    updateTooltip(ratio);
    if(video.duration){
      video.currentTime = Math.min(1, Math.max(0, ratio)) * video.duration;
    }
  }

  scrubber.addEventListener('mousedown', (e) => {
    isScrubbing = true;
    scrubTooltip.classList.add('is-visible');
    seekFromEvent(e);
  });
  scrubber.addEventListener('touchstart', (e) => {
    isScrubbing = true;
    scrubTooltip.classList.add('is-visible');
    seekFromEvent(e);
  }, { passive:true });

  scrubber.addEventListener('mouseenter', () => scrubTooltip.classList.add('is-visible'));
  scrubber.addEventListener('mousemove', (e) => { if(!isScrubbing) updateTooltip(ratioFromEvent(e)); });
  scrubber.addEventListener('mouseleave', () => { if(!isScrubbing) scrubTooltip.classList.remove('is-visible'); });

  window.addEventListener('mousemove', (e) => { if(isScrubbing) seekFromEvent(e); });
  window.addEventListener('touchmove', (e) => { if(isScrubbing) seekFromEvent(e); }, { passive:true });
  window.addEventListener('mouseup', () => { isScrubbing = false; scrubTooltip.classList.remove('is-visible'); });
  window.addEventListener('touchend', () => { isScrubbing = false; scrubTooltip.classList.remove('is-visible'); });

  /* Play only while this video is actually on screen. */
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if(entry.isIntersecting && entry.intersectionRatio > .6){
        video.play();
      } else {
        video.pause();
      }
    });
  }, { threshold:[0, .6, 1] });
  observer.observe(stage);

  updatePlayIcon();
  updateMuteIcon();
}

initVideoStage({
  video: VIDEO_1,
  videoId: 'heroVideo1', stageId: 'heroStage1',
  playBtnId: 'playBtn1', muteBtnId: 'muteBtn1',
  scrubberId: 'scrubber1', scrubberFillId: 'scrubberFill1', scrubberKnobId: 'scrubberKnob1',
  scrubTooltipId: 'scrubTooltip1', audioIndicatorId: 'audioIndicator1'
});

initVideoStage({
  video: VIDEO_2,
  videoId: 'heroVideo2', stageId: 'heroStage2',
  playBtnId: 'playBtn2', muteBtnId: 'muteBtn2',
  scrubberId: 'scrubber2', scrubberFillId: 'scrubberFill2', scrubberKnobId: 'scrubberKnob2',
  scrubTooltipId: 'scrubTooltip2', audioIndicatorId: 'audioIndicator2'
});

/* ---------------------------------------------------------
   SCROLL ROUTING
   - Wheel/touch input while the pointer is over a video
     stage (.hero-stage) uses the normal snap-scroll behaviour,
     moving one video at a time.
   - Wheel/touch input anywhere else (the surrounding black
     letterboxing) jumps straight to the Contact section, so
     it's always one scroll away and never gets "stuck" behind
     the video snap points. Scrolling up from outside a stage
     returns straight to the top video.
--------------------------------------------------------- */
const topSection = document.getElementById('top');
const contactSection = document.getElementById('contact');

window.addEventListener('wheel', (e) => {
  if(e.target.closest('.hero-stage')) return; // let normal snap-scrolling happen
  e.preventDefault();
  const target = e.deltaY > 0 ? contactSection : topSection;
  target.scrollIntoView({ behavior:'smooth' });
}, { passive:false });

let touchStartY = 0;
let touchStartTarget = null;

window.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  touchStartTarget = e.target;
}, { passive:true });

window.addEventListener('touchend', (e) => {
  if(touchStartTarget && touchStartTarget.closest('.hero-stage')) return; // let normal snap-scrolling happen
  const deltaY = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(deltaY) < 30) return; // ignore taps
  const target = deltaY > 0 ? contactSection : topSection;
  target.scrollIntoView({ behavior:'smooth' });
}, { passive:true });

/* Fade out the scroll hint once the user has scrolled past video 1 */
const scrollHint = document.getElementById('scrollHint');
const hintObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    scrollHint.classList.toggle('is-hidden', entry.intersectionRatio < .95);
  });
}, { threshold:[0, .95, 1] });
hintObserver.observe(document.getElementById('top'));

/* ---------------------------------------------------------
   PRELOADER — corner brackets draw in around the name, then
   expand out to the screen edges and fade once the page has
   finished loading.
--------------------------------------------------------- */
const preloader = document.getElementById('preloader');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(reduceMotion){
  preloader.classList.add('done');
} else {
  requestAnimationFrame(() => preloader.classList.add('show'));

  let finished = false;

  function finishLoad(){
    if(finished) return;
    finished = true;
    preloader.classList.add('collapse');
    preloader.classList.remove('show');
    setTimeout(() => preloader.classList.add('done'), 1400);
  }

  window.addEventListener('load', () => { setTimeout(finishLoad, 500); });

  /* fallback in case the load event is delayed or never fires */
  setTimeout(finishLoad, 3200);
}
</script>

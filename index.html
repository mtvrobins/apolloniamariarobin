<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollonia Maria Robin — Creative Director / Photographer / Sound Designer</title>
<meta name="description" content="Apollonia Maria Robin — Creative Director, Photographer, Sound Designer.">

<style>
  :root{
    --black: #0a0a0a;
    --white: #f4f4f2;
    --grey:  #8a8a86;
    --line:  rgba(244,244,242,0.14);
    --ease: cubic-bezier(.16,.8,.24,1);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--black);
    color:var(--white);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    height:100svh;
  }

  a{ color:inherit; text-decoration:none; }
  video{ display:block; max-width:100%; }

  .eyebrow{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--grey);
  }

  /* ---------------------------------------------------------
     PRELOADER — centered mark, tracked subtitle, progress read
  --------------------------------------------------------- */
  #preloader{
    position:fixed;
    inset:0;
    z-index:2000;
    background:var(--black);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:1;
    transition:opacity .9s var(--ease);
  }

  #preloader .pl-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  #preloader .pl-name{
    font-size:clamp(22px, 3.4vw, 40px);
    letter-spacing:.04em;
    font-weight:600;
    color:var(--white);
    opacity:0;
    transform:translateY(14px);
    transition:opacity .8s var(--ease), transform .8s var(--ease);
  }

  #preloader .pl-sub{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:14px;
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--grey);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .8s var(--ease) .12s, transform .8s var(--ease) .12s;
  }

  #preloader .pl-sub .dot{
    width:3px; height:3px;
    border-radius:50%;
    background:var(--grey);
    flex-shrink:0;
  }

  #preloader .pl-bar{
    margin-top:46px;
    width:180px;
    height:1px;
    background:var(--line);
    position:relative;
    overflow:hidden;
    opacity:0;
    transition:opacity .8s var(--ease) .2s;
  }

  #preloader .pl-bar-fill{
    position:absolute;
    top:0; left:0; bottom:0;
    width:0%;
    background:var(--white);
    transition:width .25s linear;
  }

  #preloader .pl-count{
    margin-top:16px;
    font-size:11px;
    letter-spacing:.1em;
    color:var(--grey);
    font-variant-numeric:tabular-nums;
    opacity:0;
    transition:opacity .8s var(--ease) .2s;
  }

  #preloader.show .pl-name{ opacity:1; transform:translateY(0); }
  #preloader.show .pl-sub{ opacity:1; transform:translateY(0); }
  #preloader.show .pl-bar{ opacity:1; }
  #preloader.show .pl-count{ opacity:1; }

  #preloader.collapse{
    opacity:0;
  }

  #preloader.collapse .pl-inner{
    transform:scale(.98);
    transition:transform 1s var(--ease);
  }

  #preloader.done{ display:none; }

  @media (prefers-reduced-motion: reduce){
    #preloader{ transition:none !important; }
    #preloader .pl-name, #preloader .pl-sub, #preloader .pl-bar, #preloader .pl-count{ transition:none !important; }
  }

  @media (max-width:560px){
    #preloader .pl-bar{ width:130px; }
  }

  /* ---------------------------------------------------------
     NAV
  --------------------------------------------------------- */
  header{
    position:fixed;
    top:0; left:0; right:0;
    z-index:100;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:26px 40px;
    mix-blend-mode:difference;
  }

  .brand{
    font-size:14px;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-weight:600;
  }

  /* ---------------------------------------------------------
     HERO
  --------------------------------------------------------- */
  .hero{
    position:relative;
    height:100svh;
    width:100%;
    display:flex;
    align-items:flex-end;
    overflow:hidden;
    background:#000;
  }

  .hero-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.72;
  }

  .hero-media.placeholder{
    background:
      radial-gradient(120% 90% at 15% 10%, #1c1c1a 0%, #0a0a0a 55%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 90px);
  }

  .hero::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.15) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,.85) 100%);
    pointer-events:none;
  }

  .hero-inner{
    position:relative;
    z-index:2;
    width:100%;
    padding:0 40px 64px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
  }

  .hero-label{
    font-size:11px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--grey);
    margin-bottom:14px;
  }

  .hero-title{
    font-size:clamp(30px, 5.2vw, 66px);
    line-height:1.08;
    letter-spacing:-.02em;
    font-weight:600;
    max-width:20ch;
  }

  /* ---------------------------------------------------------
     VIDEO CONTROLS — minimal scrubber + play/pause + mute
  --------------------------------------------------------- */
  .video-controls{
    position:absolute;
    left:0; right:0; bottom:0;
    z-index:3;
    padding:0 40px 26px;
  }

  .scrubber{
    position:relative;
    width:100%;
    height:14px;
    display:flex;
    align-items:center;
    cursor:pointer;
    touch-action:none;
  }

  .scrubber .track{
    position:relative;
    width:100%;
    height:1px;
    background:rgba(244,244,242,0.28);
  }

  .scrubber .fill{
    position:absolute;
    top:0; left:0; bottom:0;
    width:0%;
    background:var(--white);
  }

  .scrubber .knob{
    position:absolute;
    top:50%;
    left:0%;
    width:7px; height:7px;
    background:var(--white);
    border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:opacity .2s ease;
  }

  .scrubber:hover .knob{ opacity:1; }

  .controls-row{
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .ctrl-btn{
    background:none;
    border:none;
    padding:6px;
    margin:-6px;
    cursor:pointer;
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:.85;
    transition:opacity .2s ease;
  }

  .ctrl-btn:hover{ opacity:1; }

  .ctrl-btn svg{
    width:16px; height:16px;
    display:block;
  }

  .ctrl-btn .icon-alt{ display:none; }
  .ctrl-btn.is-active .icon-default{ display:none; }
  .ctrl-btn.is-active .icon-alt{ display:block; }

  @media (max-width:560px){
    .video-controls{ padding:0 22px 20px; }
  }

  /* ---------------------------------------------------------
     CONTACT
  --------------------------------------------------------- */
  .contact{
    border-top:1px solid var(--line);
    padding:110px 40px 90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:26px;
  }

  .contact .eyebrow{ margin-bottom:4px; }

  .contact-email{
    font-size:clamp(24px, 4vw, 46px);
    font-weight:600;
    letter-spacing:-.01em;
    border-bottom:1px solid var(--line);
    padding-bottom:14px;
    transition:border-color .3s ease, opacity .3s ease;
  }
  .contact-email:hover{ border-color:var(--white); opacity:.8; }

  .contact-phone{
    font-size:15px;
    letter-spacing:.04em;
    color:var(--grey);
  }
  .contact-phone a:hover{ color:var(--white); }

  @media (max-width:560px){
    header{ padding:20px 22px; }
    .hero-inner{ padding:0 22px 44px; }
    .contact{ padding:80px 22px 60px; }
  }

  footer{
    border-top:1px solid var(--line);
    padding:26px 40px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--grey);
  }
  @media (max-width:560px){ footer{ padding:20px 22px; flex-direction:column; gap:6px; } }

  ::selection{ background:var(--white); color:var(--black); }
</style>
</head>
<body>

<div id="preloader">
  <div class="pl-inner">
    <div class="pl-name">Apollonia Maria Robin</div>
    <div class="pl-sub"><span>Portfolio</span><span class="dot"></span><span>Mach 1</span></div>
    <div class="pl-bar"><div class="pl-bar-fill" id="plBarFill"></div></div>
    <div class="pl-count" id="plCount">0%</div>
  </div>
</div>

<header>
  <a href="#top" class="brand">Apollonia Maria Robin</a>
</header>

<!-- ============================================================
     HERO
     ------------------------------------------------------------
     To add more videos later, duplicate this pattern: drop the
     new file into the media/ folder and update HERO_VIDEO in the
     script at the bottom of this file (src + optional poster).
============================================================ -->
<section class="hero" id="top">
  <video class="hero-media" id="heroVideo" autoplay muted loop playsinline></video>
  <div class="hero-inner">
    <div>
      <div class="hero-label">Mach 001</div>
      <div class="hero-title">Apollonia<br>Maria Robin</div>
    </div>
  </div>

  <div class="video-controls">
    <div class="scrubber" id="scrubber">
      <div class="track">
        <div class="fill" id="scrubberFill"></div>
        <div class="knob" id="scrubberKnob"></div>
      </div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" id="playBtn" type="button" aria-label="Pause">
        <svg class="icon-default" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="3.4" height="12" fill="currentColor"/><rect x="9.6" y="2" width="3.4" height="12" fill="currentColor"/></svg>
        <svg class="icon-alt" viewBox="0 0 16 16" fill="none"><path d="M4 2.5L13 8L4 13.5V2.5Z" fill="currentColor"/></svg>
      </button>
      <button class="ctrl-btn" id="muteBtn" type="button" aria-label="Unmute">
        <svg class="icon-default" viewBox="0 0 16 16" fill="none"><path d="M2 6H4.6L8.4 3V13L4.6 10H2V6Z" fill="currentColor"/><path d="M10.4 5.4C11.2 6.2 11.2 9.8 10.4 10.6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M12 3.6C13.7 5.4 13.7 10.6 12 12.4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
        <svg class="icon-alt" viewBox="0 0 16 16" fill="none"><path d="M2 6H4.6L8.4 3V13L4.6 10H2V6Z" fill="currentColor"/><path d="M10.8 5.6L14 9.4M14 5.6L10.8 9.4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</section>

<!-- ============================================================
     CONTACT
============================================================ -->
<section class="contact" id="contact">
  <div class="eyebrow">Get in touch</div>
  <a href="mailto:apolloniamariarobin@gmail.com?subject=Portfolio%20Inquiry" class="contact-email">apolloniamariarobin@gmail.com</a>
  <div class="contact-phone"><a href="tel:+447427226798">+44 7427 226798</a></div>
</section>

<footer>
  <span id="year">© 2026 Apollonia Maria Robin</span>
</footer>

<script>
/* =====================================================================
   ADD YOUR VIDEO(S) HERE
   ---------------------------------------------------------------------
   Setup:
     1. Keep this index.html inside a folder.
     2. Next to it, keep a folder called "media".
     3. Drop your .mp4 file(s) into it (and an optional poster .jpg still).

   Then set the paths below:
     src    - path to your .mp4 file, e.g. "media/reel.mp4"
     poster - path to a still image shown before the video loads
              (optional)

   When you have more videos later, you can either swap src here
   for a single hero video, or ask to turn this into a gallery/grid.
===================================================================== */

const HERO_VIDEO = {
  src: "media/reel.mp4",
  poster: ""
};

/* ===================================================================== */

const heroVideo = document.getElementById('heroVideo');

function setHero(){
  if(HERO_VIDEO.src){
    heroVideo.src = HERO_VIDEO.src;
    if(HERO_VIDEO.poster) heroVideo.poster = HERO_VIDEO.poster;
    heroVideo.classList.remove('placeholder');
  } else {
    heroVideo.classList.add('placeholder');
  }
}

setHero();
document.getElementById('year').textContent = '© ' + new Date().getFullYear() + ' Apollonia Maria Robin';

/* ---------------------------------------------------------
   VIDEO CONTROLS — play/pause, mute/unmute, scrubber
--------------------------------------------------------- */
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const scrubber = document.getElementById('scrubber');
const scrubberFill = document.getElementById('scrubberFill');
const scrubberKnob = document.getElementById('scrubberKnob');
const heroSection = document.getElementById('top');

function updatePlayIcon(){
  playBtn.classList.toggle('is-active', heroVideo.paused);
  playBtn.setAttribute('aria-label', heroVideo.paused ? 'Play' : 'Pause');
}

function updateMuteIcon(){
  muteBtn.classList.toggle('is-active', heroVideo.muted);
  muteBtn.setAttribute('aria-label', heroVideo.muted ? 'Unmute' : 'Mute');
}

function togglePlay(){
  if(heroVideo.paused){ heroVideo.play(); } else { heroVideo.pause(); }
  updatePlayIcon();
}

function unmute(){
  heroVideo.muted = false;
  updateMuteIcon();
}

function toggleMute(){
  heroVideo.muted = !heroVideo.muted;
  updateMuteIcon();
}

playBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  togglePlay();
});

muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMute();
});

/* First tap/click anywhere on the video unmutes it.
   Once unmuted, tapping the video toggles play/pause. */
heroSection.addEventListener('click', (e) => {
  if(e.target.closest('.video-controls')) return;
  if(heroVideo.muted){
    unmute();
  } else {
    togglePlay();
  }
});

function setScrubber(ratio){
  const pct = Math.min(1, Math.max(0, ratio)) * 100;
  scrubberFill.style.width = pct + '%';
  scrubberKnob.style.left = pct + '%';
}

heroVideo.addEventListener('timeupdate', () => {
  if(!heroVideo.duration || isScrubbing) return;
  setScrubber(heroVideo.currentTime / heroVideo.duration);
});

heroVideo.addEventListener('play', updatePlayIcon);
heroVideo.addEventListener('pause', updatePlayIcon);
heroVideo.addEventListener('volumechange', updateMuteIcon);

let isScrubbing = false;

function seekFromEvent(e){
  const rect = scrubber.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const ratio = (clientX - rect.left) / rect.width;
  setScrubber(ratio);
  if(heroVideo.duration){
    heroVideo.currentTime = Math.min(1, Math.max(0, ratio)) * heroVideo.duration;
  }
}

scrubber.addEventListener('mousedown', (e) => {
  isScrubbing = true;
  seekFromEvent(e);
});
scrubber.addEventListener('touchstart', (e) => {
  isScrubbing = true;
  seekFromEvent(e);
}, { passive:true });

window.addEventListener('mousemove', (e) => { if(isScrubbing) seekFromEvent(e); });
window.addEventListener('touchmove', (e) => { if(isScrubbing) seekFromEvent(e); }, { passive:true });
window.addEventListener('mouseup', () => { isScrubbing = false; });
window.addEventListener('touchend', () => { isScrubbing = false; });

updatePlayIcon();
updateMuteIcon();

/* Preloader reveal — animated percentage counter, then fade/scale out */
const preloader = document.getElementById('preloader');
const plBarFill = document.getElementById('plBarFill');
const plCount = document.getElementById('plCount');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(reduceMotion){
  preloader.classList.add('done');
} else {
  requestAnimationFrame(() => preloader.classList.add('show'));

  let progress = 0;
  let pageLoaded = false;
  let finished = false;

  function finishLoad(){
    if(finished) return;
    finished = true;
    setTimeout(() => {
      preloader.classList.add('collapse');
      preloader.classList.remove('show');
      setTimeout(() => preloader.classList.add('done'), 1000);
    }, 250);
  }

  function tick(){
    if(finished) return;
    // Ease toward 90% while waiting, then only complete once the page has loaded
    const ceiling = pageLoaded ? 100 : 90;
    progress += (ceiling - progress) * 0.09 + (pageLoaded ? 1.4 : 0.15);
    if(progress >= ceiling) progress = ceiling;

    const display = Math.min(100, Math.round(progress));
    plBarFill.style.width = display + '%';
    plCount.textContent = display + '%';

    if(display >= 100){
      finishLoad();
      return;
    }
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
  window.addEventListener('load', () => { pageLoaded = true; });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollonia Maria Robin — Creative Director / Photographer / Sound Designer</title>
<meta name="description" content="Apollonia Maria Robin — Creative Director, Photographer, Sound Designer.">

<style>
  :root{
    --black: #0a0a0a;
    --white: #f4f4f2;
    --grey:  #8a8a86;
    --line:  rgba(244,244,242,0.14);
    --ease: cubic-bezier(.16,.8,.24,1);
    --pl-pad-x: min(230px, 30vw);
    --pl-pad-y: min(54px, 9vw);
    --ctrl-size: 14px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{
    scroll-behavior:smooth;
    scroll-snap-type:y mandatory;
  }

  body{
    background:var(--black);
    color:var(--white);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  a{ color:inherit; text-decoration:none; }
  video{ display:block; max-width:100%; }

  .eyebrow{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--grey);
  }

  /* ---------------------------------------------------------
     PRELOADER
  --------------------------------------------------------- */
  #preloader{
    position:fixed;
    inset:0;
    z-index:2000;
    background:var(--black);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:1;
    transition:opacity .9s var(--ease);
  }

  #preloader .pl-inner{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
  }

  #preloader .pl-name{
    font-size:clamp(16px, 2.6vw, 26px);
    letter-spacing:.22em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--white);
    opacity:0;
    transform:translateY(8px);
    transition:opacity .8s var(--ease), transform .8s var(--ease);
    white-space:nowrap;
  }

  #preloader.show .pl-name{ opacity:1; transform:translateY(0); }

  #preloader .pl-sub{
    font-size:10px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--grey);
    white-space:nowrap;
    opacity:0;
    transform:translateY(4px);
    transition:opacity .8s var(--ease) .1s, transform .8s var(--ease) .1s;
  }

  #preloader.show .pl-sub{ opacity:1; transform:translateY(0); }

  #preloader.collapse .pl-sub{
    opacity:0;
    transition:opacity .5s var(--ease);
  }

  .pl-corner{
    position:fixed;
    width:15px;
    height:15px;
    opacity:0;
    transition:transform 1.1s var(--ease), opacity .7s var(--ease);
  }

  .pl-corner.tl{ top:26px; left:26px; border-top:1px solid var(--white); border-left:1px solid var(--white);
    transform:translate(calc(50vw - 26px - var(--pl-pad-x)), calc(50vh - 26px - var(--pl-pad-y))); }
  .pl-corner.tr{ top:26px; right:26px; border-top:1px solid var(--white); border-right:1px solid var(--white);
    transform:translate(calc(-50vw + 26px + var(--pl-pad-x)), calc(50vh - 26px - var(--pl-pad-y))); }
  .pl-corner.bl{ bottom:26px; left:26px; border-bottom:1px solid var(--white); border-left:1px solid var(--white);
    transform:translate(calc(50vw - 26px - var(--pl-pad-x)), calc(-50vh + 26px + var(--pl-pad-y))); }
  .pl-corner.br{ bottom:26px; right:26px; border-bottom:1px solid var(--white); border-right:1px solid var(--white);
    transform:translate(calc(-50vw + 26px + var(--pl-pad-x)), calc(-50vh + 26px + var(--pl-pad-y))); }

  #preloader.show .pl-corner{ opacity:1; }

  #preloader.collapse .pl-corner{
    transform:translate(0,0);
    opacity:0;
  }

  #preloader.collapse .pl-name{
    opacity:0;
    transition:opacity .5s var(--ease);
  }

  #preloader.collapse{
    transition:opacity .6s var(--ease) .7s;
    opacity:0;
  }

  #preloader.done{ display:none; }

  @media (prefers-reduced-motion: reduce){
    #preloader{ transition:none !important; }
    #preloader .pl-name, .pl-corner{ transition:none !important; }
  }

  /* ---------------------------------------------------------
     NAV
  --------------------------------------------------------- */
  header{
    position:fixed;
    top:0; left:0; right:0;
    z-index:100;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:26px 40px;
    mix-blend-mode:difference;
  }

  .brand{
    font-size:14px;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-weight:600;
  }

  /* ---------------------------------------------------------
     HERO / VIDEO SECTION — single snap point on the page.
     The video box inside it is its own self-contained scroll
     zone: wheel/touch input captured there switches between
     tracks instead of moving the page.
  --------------------------------------------------------- */
  .video-section{
    position:relative;
    height:100svh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:#000;
    gap:20px;
    scroll-snap-align:start;
    scroll-snap-stop:always;
  }

  .hero-stage{
    position:relative;
    width:min(1120px, 84vw);
    display:flex;
    flex-direction:column;
  }

  .hero-frame{
    position:relative;
    width:100%;
    height:min(640px, 62vh);
    background:#000;
    overflow:hidden;
    cursor:pointer;
  }

  .hero-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    z-index:1;
    pointer-events:none;
    transition:opacity .6s var(--ease);
  }

  .hero-media.is-front{
    opacity:1;
    z-index:2;
  }

  .hero-media.placeholder{
    background:
      radial-gradient(120% 90% at 15% 10%, #1c1c1a 0%, #0a0a0a 55%),
      repeating-linear-gradient(115deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 90px);
  }

  /* ---------------------------------------------------------
     AUDIO INDICATOR — small crossfading reminder shown over
     the video while it is muted. Two phrases fade into one
     another like a slow, steady beacon: 3s readable per
     phrase, 6s for a full cycle.
  --------------------------------------------------------- */
  .audio-indicator{
    position:absolute;
    top:14px;
    left:0;
    right:0;
    z-index:3;
    display:flex;
    justify-content:center;
    pointer-events:none;
    opacity:1;
    transition:opacity .5s var(--ease);
  }

  .audio-indicator.is-hidden{
    opacity:0;
  }

  .audio-indicator-inner{
    position:relative;
    height:14px;
  }

  .audio-indicator span{
    position:absolute;
    top:0; left:50%;
    transform:translateX(-50%);
    font-size:9.5px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--white);
    white-space:nowrap;
    opacity:0;
    animation:audioFade 6000ms ease-in-out infinite;
  }

  .audio-indicator span.phrase-b{
    animation-delay:-3000ms;
  }

  @keyframes audioFade{
    0%      { opacity:0; }
    6%      { opacity:.85; }
    44%     { opacity:.85; }
    50%     { opacity:0; }
    100%    { opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .audio-indicator span{ animation:none; opacity:.35; }
  }

  /* ---------------------------------------------------------
     TRACK SWITCH HINT — subtle, only on the video box itself
  --------------------------------------------------------- */
  .track-hint{
    position:absolute;
    bottom:14px;
    left:0;
    right:0;
    z-index:3;
    display:flex;
    justify-content:center;
    pointer-events:none;
    opacity:.55;
    transition:opacity .4s ease;
  }

  .track-hint.is-hidden{ opacity:0; }

  .track-hint span{
    font-size:9px;
    letter-spacing:.26em;
    text-transform:uppercase;
    color:var(--white);
  }

  /* ---------------------------------------------------------
     CONTROL BAR — sits outside/below the video frame.
  --------------------------------------------------------- */
  .control-bar{
    position:relative;
    width:100%;
    background:#000;
    padding:13px 20px;
    display:flex;
    align-items:center;
    gap:22px;
  }

  .control-corner{
    position:absolute;
    width:6px;
    height:6px;
    pointer-events:none;
  }
  .control-corner.tl{ top:-2px; left:-2px; border-top:1px solid var(--white); border-left:1px solid var(--white); }
  .control-corner.tr{ top:-2px; right:-2px; border-top:1px solid var(--white); border-right:1px solid var(--white); }
  .control-corner.bl{ bottom:-2px; left:-2px; border-bottom:1px solid var(--white); border-left:1px solid var(--white); }
  .control-corner.br{ bottom:-2px; right:-2px; border-bottom:1px solid var(--white); border-right:1px solid var(--white); }

  .control-titles{
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-shrink:0;
    white-space:nowrap;
  }

  .control-track{
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size:var(--ctrl-size);
    font-weight:700;
    letter-spacing:.02em;
    text-transform:uppercase;
    color:var(--white);
  }

  .control-artist{
    font-family:'Times New Roman', Georgia, 'Cambria', serif;
    font-size:var(--ctrl-size);
    color:var(--white);
    letter-spacing:.01em;
  }

  .control-mid{
    flex:1;
    display:flex;
    align-items:center;
    min-width:0;
  }

  .scrub-tooltip{
    position:absolute;
    bottom:calc(100% + 10px);
    left:0%;
    transform:translateX(-50%);
    font-family:'Times New Roman', Georgia, 'Cambria', serif;
    font-size:12px;
    color:var(--white);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }

  .scrub-tooltip.is-visible{ opacity:1; }

  .scrubber{
    position:relative;
    width:100%;
    height:14px;
    display:flex;
    align-items:center;
    cursor:pointer;
    touch-action:none;
  }

  .scrubber .track{
    position:relative;
    width:100%;
    height:1px;
    background:rgba(244,244,242,0.28);
  }

  .scrubber .fill{
    position:absolute;
    top:0; left:0; bottom:0;
    width:0%;
    background:var(--white);
  }

  .scrubber .knob{
    position:absolute;
    top:50%;
    left:0%;
    width:7px; height:7px;
    background:var(--white);
    border-radius:50%;
    transform:translate(-50%,-50%);
  }

  .control-actions{
    display:flex;
    align-items:center;
    gap:18px;
    flex-shrink:0;
  }

  .ctrl-btn{
    background:none;
    border:none;
    padding:2px;
    cursor:pointer;
    color:var(--white);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:.9;
    transition:opacity .2s ease;
  }

  .ctrl-btn:hover{ opacity:1; }

  .ctrl-btn svg{
    width:var(--ctrl-size);
    height:var(--ctrl-size);
    display:block;
  }

  .ctrl-btn .icon-alt{ display:none; }
  .ctrl-btn.is-active .icon-default{ display:none; }
  .ctrl-btn.is-active .icon-alt{ display:block; }

  /* ---------------------------------------------------------
     SCROLL HINT — points toward Contact
  --------------------------------------------------------- */
  .scroll-hint{
    position:absolute;
    left:50%;
    bottom:26px;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    opacity:.6;
    transition:opacity .5s var(--ease);
    z-index:3;
  }

  .scroll-hint.is-hidden{ opacity:0; }

  .scroll-hint span{
    font-size:10px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--grey);
  }

  .scroll-hint svg{
    width:12px;
    height:12px;
    animation:scrollBounce 2.4s ease-in-out infinite;
  }

  @keyframes scrollBounce{
    0%, 100% { transform:translateY(0); opacity:.5; }
    50%      { transform:translateY(5px); opacity:1; }
  }

  @media (prefers-reduced-motion: reduce){
    .scroll-hint svg{ animation:none; }
  }

  @media (max-width:720px){
    .control-bar{ flex-wrap:wrap; padding:12px 14px; gap:12px; }
    .control-mid{ order:3; width:100%; }
    .control-actions{ gap:14px; }
  }

  /* ---------------------------------------------------------
     CONTACT
  --------------------------------------------------------- */
  .contact{
    border-top:1px solid var(--line);
    padding:110px 40px 90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:26px;
    scroll-snap-align:start;
  }

  .contact .eyebrow{ margin-bottom:4px; }

  .contact-email{
    font-size:clamp(24px, 4vw, 46px);
    font-weight:600;
    letter-spacing:-.01em;
    border-bottom:1px solid var(--line);
    padding-bottom:14px;
    transition:border-color .3s ease, opacity .3s ease;
  }
  .contact-email:hover{ border-color:var(--white); opacity:.8; }

  .contact-phone{
    font-size:15px;
    letter-spacing:.04em;
    color:var(--grey);
  }
  .contact-phone a:hover{ color:var(--white); }

  @media (max-width:560px){
    header{ padding:20px 22px; }
    .contact{ padding:80px 22px 60px; }
  }

  footer{
    border-top:1px solid var(--line);
    padding:26px 40px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--grey);
  }
  @media (max-width:560px){ footer{ padding:20px 22px; flex-direction:column; gap:6px; } }

  ::selection{ background:var(--white); color:var(--black); }
</style>
</head>

<script>
/* =====================================================================
   VIDEO TRACKS
   ---------------------------------------------------------------------
   One entry per video. "src" is just the filename — keep every video
   file in the same folder as this index.html (same as reel.mp4 today).

   HOW TO ADD A THIRD VIDEO LATER:
     1. Add a new line below, e.g.
          { label: "Mach 003", src: "reel3.mp4" }
     2. Upload reel3.mp4 into the same GitHub folder as index.html
        (see upload steps further down this comment).
     That's the whole change — no other code needs editing. The video
     box, controls, and audio handling all read from this list.

   HOW TO UPLOAD reel2.mp4 TO GITHUB (same idea you used for reel.mp4
   with the "Add hero video" commit):
     1. Open your repository on github.com.
     2. Make sure you're looking at the same folder that already
        contains index.html and reel.mp4 (not a subfolder — the file
        needs to sit right next to index.html for the path below to
        find it).
     3. Click "Add file" (top right of the file list) → "Upload files".
     4. Drag reel2.mp4 into the upload box, or click "choose your
        files" and select it from your computer.
     5. Wait for the upload progress bar to finish — don't navigate
        away while it's uploading.
     6. Scroll down to "Commit changes". Give it a clear message,
        e.g. "Add second video", the same way you named the first
        commit "Add hero video".
     7. Make sure "Commit directly to the main branch" is selected
        (unless you're intentionally using a different branch).
     8. Click "Commit changes".
     9. Refresh your live site — Mach 002 will now work automatically
        once you scroll inside the video box, since it's already
        wired up in the list below.
===================================================================== */

const TRACKS = [
  { label: "Mach 001", src: "reel.mp4" },
  { label: "Mach 002", src: "reel2.mp4" }
];

/* ===================================================================== */

document.getElementById('year').textContent = '© ' + new Date().getFullYear() + ' Apollonia Maria Robin';

function formatTime(seconds){
  if(!isFinite(seconds)) return '0:00';
  const total = Math.max(0, Math.floor(seconds));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

/* ---------------------------------------------------------
   DOM refs — shared control bar, bound to whichever slot is
   currently "front".
--------------------------------------------------------- */
const heroFrame = document.getElementById('heroFrame');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const scrubber = document.getElementById('scrubber');
const scrubberFill = document.getElementById('scrubberFill');
const scrubberKnob = document.getElementById('scrubberKnob');
const scrubTooltip = document.getElementById('scrubTooltip');
const audioIndicator = document.getElementById('audioIndicator');
const controlTrackLabel = document.getElementById('controlTrack');
const trackHint = document.getElementById('trackHint');

/* ---------------------------------------------------------
   WEB AUDIO — a shared "large church" reverb impulse and a
   per-video signal chain (dry path + filtered/reverbed wet
   path) so a video that's been scrolled away from can fade
   out through a slow, muffled, reverberant tail instead of
   cutting instantly, while it keeps playing silently on
   screen underneath the current track.
--------------------------------------------------------- */
let audioCtx = null;
let reverbBuffer = null;

const FADE_SLOW = 6.5;     // seconds — lingering fade when nothing new has been unmuted yet
const FADE_FAST = 0.6;     // seconds — quick cutoff once the next video is unmuted
const FADE_CONTACT = 9;    // seconds — extra-long linger when leaving to Contact

function createChurchImpulse(ctx){
  const duration = 4.2;
  const decay = 3.2;
  const rate = ctx.sampleRate;
  const length = Math.floor(rate * duration);
  const impulse = ctx.createBuffer(2, length, rate);
  for(let ch = 0; ch < 2; ch++){
    const data = impulse.getChannelData(ch);
    for(let i = 0; i < length; i++){
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

function ensureAudioContext(){
  if(audioCtx) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  reverbBuffer = createChurchImpulse(audioCtx);
  slots.forEach(attachChain);
}

function attachChain(slot){
  if(slot.chain) return;
  const source = audioCtx.createMediaElementSource(slot.video);
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  const masterGain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 18000;
  const convolver = audioCtx.createConvolver();
  convolver.buffer = reverbBuffer;

  dryGain.gain.value = 1;
  wetGain.gain.value = 0;
  masterGain.gain.value = 0;

  source.connect(dryGain);
  source.connect(filter);
  filter.connect(convolver);
  convolver.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);

  slot.chain = { dryGain, wetGain, masterGain, filter, convolver };
}

function rampParam(param, target, duration){
  const now = audioCtx.currentTime;
  param.cancelScheduledValues(now);
  param.setValueAtTime(param.value, now);
  param.linearRampToValueAtTime(target, now + duration);
}

function resetSlotDry(slot){
  clearTimeout(slot.fadeTimer);
  slot.fading = false;
  if(!slot.chain) return;
  const { dryGain, wetGain, masterGain, filter } = slot.chain;
  const now = audioCtx.currentTime;
  [dryGain.gain, wetGain.gain, masterGain.gain, filter.frequency].forEach(p => p.cancelScheduledValues(now));
  dryGain.gain.setValueAtTime(1, now);
  wetGain.gain.setValueAtTime(0, now);
  filter.frequency.setValueAtTime(18000, now);
  masterGain.gain.setValueAtTime(slot.audible ? 1 : 0, now);
}

function cancelFadeAndRestore(slot){
  clearTimeout(slot.fadeTimer);
  slot.fading = false;
  if(!slot.chain) return;
  const { dryGain, wetGain, masterGain, filter } = slot.chain;
  rampParam(dryGain.gain, 1, .3);
  rampParam(wetGain.gain, 0, .3);
  rampParam(filter.frequency, 18000, .3);
  rampParam(masterGain.gain, slot.audible ? 1 : 0, .3);
}

function reverbFadeOut(slot, duration){
  if(!slot.chain) return;
  const { dryGain, wetGain, masterGain, filter } = slot.chain;
  const onset = Math.min(1.1, duration * 0.4);
  rampParam(dryGain.gain, 0, onset);
  rampParam(wetGain.gain, .8, onset);
  rampParam(filter.frequency, 500, onset);
  rampParam(masterGain.gain, 0, duration);

  slot.fading = true;
  clearTimeout(slot.fadeTimer);
  slot.fadeTimer = setTimeout(() => {
    slot.fading = false;
    slot.audible = false;
    resetSlotDry(slot);
    slot.video.pause();
  }, duration * 1000 + 60);
}

function accelerateReverbFadeOut(slot){
  if(!slot.chain || !slot.fading) return;
  clearTimeout(slot.fadeTimer);
  rampParam(slot.chain.masterGain.gain, 0, FADE_FAST);
  slot.fadeTimer = setTimeout(() => {
    slot.fading = false;
    slot.audible = false;
    resetSlotDry(slot);
    slot.video.pause();
  }, FADE_FAST * 1000 + 60);
}

function quickSetAudible(slot, audible){
  slot.audible = audible;
  if(!slot.chain){
    if(audible) ensureAudioContext();
  }
  if(slot.chain){
    rampParam(slot.chain.dryGain.gain, 1, .15);
    rampParam(slot.chain.masterGain.gain, audible ? 1 : 0, audible ? .15 : .25);
  }
}

/* ---------------------------------------------------------
   SLOTS — two persistent <video> elements. One is "front"
   (visible, controllable) and one is "back" (hidden, either
   idle or fading out its audio from a moment ago). Switching
   tracks swaps which is which and reassigns the back slot's
   src to the next track, rather than creating new elements.
--------------------------------------------------------- */
function makeSlot(videoId){
  const video = document.getElementById(videoId);
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  const slot = { video, chain: null, audible: false, fading: false, fadeTimer: null, trackIndex: -1 };

  video.addEventListener('timeupdate', () => {
    if(getFrontSlot() !== slot || isScrubbing) return;
    if(video.duration) setScrubber(video.currentTime / video.duration);
  });
  video.addEventListener('play', () => { if(getFrontSlot() === slot) updatePlayIcon(slot); });
  video.addEventListener('pause', () => { if(getFrontSlot() === slot) updatePlayIcon(slot); });

  return slot;
}

const slotA = makeSlot('heroVideoA');
const slotB = makeSlot('heroVideoB');
const slots = [slotA, slotB];

let frontSlot = slotA;
let backSlot = slotB;
let currentIndex = 0;

function getFrontSlot(){ return frontSlot; }

function loadTrackIntoSlot(slot, index){
  slot.trackIndex = index;
  slot.audible = false;
  resetSlotDry(slot);
  slot.video.src = TRACKS[index].src;
  slot.video.currentTime = 0;
  slot.video.play().catch(() => {});
}

/* Boot the first track into the front slot. */
loadTrackIntoSlot(frontSlot, 0);
frontSlot.video.classList.add('is-front');
backSlot.video.classList.remove('is-front');

/* ---------------------------------------------------------
   UI updates
--------------------------------------------------------- */
function updatePlayIcon(slot){
  playBtn.classList.toggle('is-active', slot.video.paused);
  playBtn.setAttribute('aria-label', slot.video.paused ? 'Play' : 'Pause');
}

function updateMuteIcon(slot){
  muteBtn.classList.toggle('is-active', !slot.audible);
  muteBtn.setAttribute('aria-label', slot.audible ? 'Mute' : 'Unmute');
  audioIndicator.classList.toggle('is-hidden', slot.audible);
}

function setScrubber(ratio){
  const pct = Math.min(1, Math.max(0, ratio)) * 100;
  scrubberFill.style.width = pct + '%';
  scrubberKnob.style.left = pct + '%';
}

function refreshControlsForFront(){
  const slot = frontSlot;
  controlTrackLabel.textContent = TRACKS[slot.trackIndex].label;
  setScrubber(slot.video.duration ? slot.video.currentTime / slot.video.duration : 0);
  updatePlayIcon(slot);
  updateMuteIcon(slot);
}

refreshControlsForFront();

/* ---------------------------------------------------------
   Playback controls — always act on the front slot.
--------------------------------------------------------- */
function togglePlay(){
  const v = frontSlot.video;
  if(v.paused){ v.play(); } else { v.pause(); }
}

function toggleFrontAudible(){
  ensureAudioContext();
  if(frontSlot.audible){
    quickSetAudible(frontSlot, false);
  } else {
    quickSetAudible(frontSlot, true);
    if(backSlot.fading) accelerateReverbFadeOut(backSlot);
  }
  updateMuteIcon(frontSlot);
}

playBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
muteBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFrontAudible(); });

heroFrame.addEventListener('click', (e) => {
  if(e.target.closest('.control-bar')) return;
  if(!frontSlot.audible){
    toggleFrontAudible();
  } else {
    togglePlay();
  }
});

/* ---------------------------------------------------------
   Scrubber — hover tooltip in Times New Roman, click/drag
   to seek. No persistent time readout on the bar itself.
--------------------------------------------------------- */
let isScrubbing = false;

function updateTooltip(ratio){
  const clamped = Math.min(1, Math.max(0, ratio));
  const v = frontSlot.video;
  const t = v.duration ? clamped * v.duration : 0;
  scrubTooltip.textContent = formatTime(t);
  scrubTooltip.style.left = (clamped * 100) + '%';
}

function ratioFromEvent(e){
  const rect = scrubber.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return (clientX - rect.left) / rect.width;
}

function seekFromEvent(e){
  const ratio = ratioFromEvent(e);
  setScrubber(ratio);
  updateTooltip(ratio);
  const v = frontSlot.video;
  if(v.duration) v.currentTime = Math.min(1, Math.max(0, ratio)) * v.duration;
}

scrubber.addEventListener('mousedown', (e) => {
  isScrubbing = true;
  scrubTooltip.classList.add('is-visible');
  seekFromEvent(e);
});
scrubber.addEventListener('touchstart', (e) => {
  isScrubbing = true;
  scrubTooltip.classList.add('is-visible');
  seekFromEvent(e);
}, { passive:true });

scrubber.addEventListener('mouseenter', () => scrubTooltip.classList.add('is-visible'));
scrubber.addEventListener('mousemove', (e) => { if(!isScrubbing) updateTooltip(ratioFromEvent(e)); });
scrubber.addEventListener('mouseleave', () => { if(!isScrubbing) scrubTooltip.classList.remove('is-visible'); });

window.addEventListener('mousemove', (e) => { if(isScrubbing) seekFromEvent(e); });
window.addEventListener('touchmove', (e) => { if(isScrubbing) seekFromEvent(e); }, { passive:true });
window.addEventListener('mouseup', () => { isScrubbing = false; scrubTooltip.classList.remove('is-visible'); });
window.addEventListener('touchend', () => { isScrubbing = false; scrubTooltip.classList.remove('is-visible'); });

/* ---------------------------------------------------------
   TRACK SWITCHING — wheel/touch captured entirely inside the
   video box. Never lets the outer page move; only changes
   which track is showing.
--------------------------------------------------------- */
function switchTrack(nextIndex){
  if(nextIndex === currentIndex || nextIndex < 0 || nextIndex >= TRACKS.length) return;

  const incoming = backSlot;
  const outgoing = frontSlot;

  loadTrackIntoSlot(incoming, nextIndex);
  incoming.video.classList.add('is-front');
  outgoing.video.classList.remove('is-front');

  if(outgoing.audible){
    reverbFadeOut(outgoing, FADE_SLOW);
  } else {
    resetSlotDry(outgoing);
  }

  frontSlot = incoming;
  backSlot = outgoing;
  currentIndex = nextIndex;

  refreshControlsForFront();
}

let switchLocked = false;
function lockSwitching(ms){
  switchLocked = true;
  setTimeout(() => { switchLocked = false; }, ms);
}

heroFrame.addEventListener('wheel', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if(switchLocked) return;
  if(Math.abs(e.deltaY) < 4) return;
  const dir = e.deltaY > 0 ? 1 : -1;
  const next = currentIndex + dir;
  if(next < 0 || next >= TRACKS.length) return;
  lockSwitching(700);
  switchTrack(next);
}, { passive:false });

let boxTouchStartY = null;
heroFrame.addEventListener('touchstart', (e) => {
  boxTouchStartY = e.touches[0].clientY;
}, { passive:true });

heroFrame.addEventListener('touchmove', (e) => {
  e.preventDefault();
}, { passive:false });

heroFrame.addEventListener('touchend', (e) => {
  if(boxTouchStartY === null || switchLocked) return;
  const deltaY = boxTouchStartY - e.changedTouches[0].clientY;
  boxTouchStartY = null;
  if(Math.abs(deltaY) < 40) return;
  const dir = deltaY > 0 ? 1 : -1;
  const next = currentIndex + dir;
  if(next < 0 || next >= TRACKS.length) return;
  lockSwitching(700);
  switchTrack(next);
}, { passive:true });

/* ---------------------------------------------------------
   Leaving to Contact — the front video keeps playing, and if
   it was audible its audio lingers and fades gradually
   through the same reverb tail rather than cutting.
--------------------------------------------------------- */
const heroSection = document.getElementById('top');
const contactObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if(entry.isIntersecting){
      if(frontSlot.fading) cancelFadeAndRestore(frontSlot);
    } else if(frontSlot.audible){
      reverbFadeOut(frontSlot, FADE_CONTACT);
    }
  });
}, { threshold: [0, .4, 1] });
contactObserver.observe(heroSection);

/* Resume the audio context on the first interaction anywhere,
   satisfying browser autoplay-with-sound requirements. */
document.addEventListener('pointerdown', () => {
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}, { once:false });

/* Fade the scroll hint once the user has scrolled past the video section */
const scrollHint = document.getElementById('scrollHint');
const hintObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    scrollHint.classList.toggle('is-hidden', entry.intersectionRatio < .95);
  });
}, { threshold:[0, .95, 1] });
hintObserver.observe(heroSection);

/* Fade the "scroll for next video" hint after first interaction inside the box */
let trackHintShown = true;
heroFrame.addEventListener('wheel', () => {
  if(trackHintShown){
    trackHintShown = false;
    trackHint.classList.add('is-hidden');
  }
}, { passive:true });

/* ---------------------------------------------------------
   PRELOADER
--------------------------------------------------------- */
const preloader = document.getElementById('preloader');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(reduceMotion){
  preloader.classList.add('done');
} else {
  requestAnimationFrame(() => preloader.classList.add('show'));

  let finished = false;

  function finishLoad(){
    if(finished) return;
    finished = true;
    preloader.classList.add('collapse');
    preloader.classList.remove('show');
    setTimeout(() => preloader.classList.add('done'), 1400);
  }

  window.addEventListener('load', () => { setTimeout(finishLoad, 500); });
  setTimeout(finishLoad, 3200);
}
</script>

</body>
